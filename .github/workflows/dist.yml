name: Distribute
run-name: "dist(${{ github.event.workflow_run.head_branch }}): create distribution database"

on:
  workflow_run:
    branches: [main]
    types: [completed]
    workflows: [CI]

jobs:
  prepare:
    name: Prepare
    uses: projek-xyz/actions/.github/workflows/prepare.yml@main

  upstream:
    name: Upstream DB
    uses: ./.github/workflows/upstream.yml
    needs: [prepare]
    with:
      composer-cache-dir: ${{ needs.prepare.outputs.composer-cache-dir }}
      branch-name: ${{ github.ref_name }}
      generate-static: true

  distribute:
    name: Create Distribution Database
    runs-on: ubuntu-latest
    needs: [upstream]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Cache upstream
        id: upstream
        uses: actions/cache/restore@v5
        with:
          path: database/nusa.*.sqlite
          key: upstream-database_${{ github.ref_name }}_${{ hashFiles('**/*.sql') }}
          restore-keys: upstream-database_${{ github.ref_name }}_

      - name: Commit distribution database
        if: ${{ needs.upstream.outputs.has-changes == '1' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/commit-changes.sh

      - name: Create summary
        if: always()
        env:
          # COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.actor }}
        run: ./.github/scripts/create-summary.sh

  # Build job
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [upstream]

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: true

      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with VitePress
        run: pnpm docs:build

      - name: Download static artifacts
        uses: actions/download-artifact@v8
        with:
          name: static-artifacts-${{ github.ref_name }}
          path: resources/docs/.vitepress/dist/api

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: resources/docs/.vitepress/dist

  # Deployment job
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
