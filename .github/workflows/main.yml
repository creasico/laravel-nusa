name: CI

on:
  schedule: # scheduled to run at 23.00 on Saturday (UTC), means 6.00 on Monday (WIB)
    - cron: '0 23 * * 6'
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # paths: ['.github/**.yml', 'src/*', 'tests/*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    uses: projek-xyz/actions/.github/workflows/prepare.yml@main
    secrets:
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

  upstream:
    name: Upstream DB
    uses: ./.github/workflows/upstream.yml
    needs: [prepare]
    with:
      composer-cache-dir: ${{ needs.prepare.outputs.composer-cache-dir }}
      branch-name: ${{ needs.prepare.outputs.branch-name }}

  tests:
    name: Test on PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} DB ${{ matrix.db }}
    runs-on: ubuntu-latest
    needs: [prepare, upstream]

    env:
      DB_CONNECTION: ${{ matrix.db }}
      DB_DATABASE: ${{ github.repository_owner }}
      DB_USERNAME: ${{ github.repository_owner }}
      DB_PASSWORD: secret
      GIT_BRANCH: ${{ needs.prepare.outputs.branch-name }}

    services:
      postgresql:
        image: postgres:14
        env:
          POSTGRES_DB: ${{ env.DB_DATABASE }}
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ env.DB_DATABASE }}
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        db: [mysql, pgsql, sqlite]
        laravel: [11.x, 12.x, 13.x]
        php: [8.5]
        include:
          - php: 8.3
            laravel: 11.x
            db: mysql

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: xdebug
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Cache upstream
        id: upstream
        uses: actions/cache/restore@v5
        with:
          path: database/nusa.*.sqlite
          key: upstream-database_${{ env.GIT_BRANCH }}_${{ hashFiles('**/*.sql') }}
          restore-keys: upstream-database_${{ env.GIT_BRANCH }}_

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ needs.prepare.outputs.composer-cache-dir }}
          key: php-${{ matrix.php }}-l${{ matrix.laravel }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-${{ matrix.php }}-l${{ matrix.laravel }}-composer-

      - name: Install dependencies
        run: |
          composer require "laravel/framework=${{ matrix.laravel }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress
          ls -lah database

      - name: Run tests
        env:
          COLUMNS: 100
        run: |
          vendor/bin/testbench migrate --ansi
          vendor/bin/testbench package:test --ansi --coverage

      - name: Generate reports for Coveralls
        if: needs.prepare.outputs.has-coveralls == '1'
        uses: coverallsapp/github-action@v2
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.db }}
          file: tests/coverage/clover.xml
          parallel: true

  reports:
    name: Report Test Coverages
    needs: [prepare, tests]
    if: needs.prepare.outputs.should-reports == '1'
    uses: projek-xyz/actions/.github/workflows/report.yml@main
    with:
      has-coveralls: ${{ needs.prepare.outputs.has-coveralls == '1' }}
